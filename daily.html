<!DOCTYPE html>
<html lang="en" data-theme="dark" data-page="daily">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/png" href="images/icons/icon-192.png">
<title>Daily Bible Read | ENJC</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/tools.css">
<link rel="stylesheet" href="css/design-system.css">
<link rel="stylesheet" href="css/premium-v2.css">
<link rel="stylesheet" href="css/mobile-fix.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;padding-bottom:60px}
</style>

<link rel="stylesheet" href="css/parchment.css">
</head>
<body>
<header class="fp-head">
  <a href="index.html" class="fp-back"><i class="ti ti-arrow-left"></i></a>
  <span class="fp-title">📅 Daily Bible Read</span>
</header>
<div class="fp-body" id="fp-body"><div class="bload"><div class="bspin"></div></div></div>
<script src="js/features.js"></script>
<script>
(function(){
  document.documentElement.setAttribute('data-theme', localStorage.getItem('enjc-theme')||'dark');
  // Override navigate to go to bible.html with chapter
  window.goDailyChapter = function(book, ch){
    const i = DAILY_PLAN.findIndex(d=>d.book===book&&d.ch===ch);
    if(i >= 0){ const p=getDailyProgress(); p['day_'+i]=true; saveDailyProgress(p); }
    try{ sessionStorage.setItem('enjc_go', JSON.stringify({book, ch})); }catch(e){}
    location.href = 'bible.html';
  };
  renderDaily(document.getElementById("fp-body"));
})();
</script>
</body></html>

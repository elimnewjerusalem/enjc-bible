<!DOCTYPE html>
<html lang="en" data-theme="dark" data-page="search">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/png" href="images/icons/icon-192.png">
<title>Word Search | ENJC</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/tools.css">
<link rel="stylesheet" href="css/design-system.css">
<link rel="stylesheet" href="css/premium-v2.css">
<link rel="stylesheet" href="css/mobile-fix.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;padding-bottom:60px}
</style>
<link rel="stylesheet" href="css/parchment.css">
</head>
<body>
<header class="fp-head">
  <a href="index.html" class="fp-back"><i class="ti ti-arrow-left"></i></a>
  <span class="fp-title">🔍 Word Search</span>
</header>

<div class="srch-bar">
  <input class="srch-inp" id="srch-inp" type="search" placeholder="Search: love, grace, faith..." autocomplete="off" spellcheck="false">
  <button class="srch-go" onclick="runSearch()">Search</button>
</div>

<div class="srch-tabs">
  <button class="stab on" id="tab-en" onclick="setTab('en')">English (KJV)</button>
  <button class="stab" id="tab-ta" onclick="setTab('ta')">தமிழ் (OV)</button>
</div>

<div class="fp-body" id="fp-body">
  <div class="srch-empty">
    <i class="ti ti-bible"></i>
    வார்த்தை தட்டச்சு செய்து Search அழுத்துங்கள்<br>
    <small style="color:var(--tx3);font-size:11px">Examples: love · grace · faith · அன்பு · கிருபை</small>
  </div>
</div>

<script src="js/features.js"></script>
<script>
(function(){
  document.documentElement.setAttribute('data-theme', localStorage.getItem('enjc-theme')||'dark');

  let currentTab = 'en';
  const inp = document.getElementById('srch-inp');
  const body = document.getElementById('fp-body');

  inp.addEventListener('keydown', e => { if(e.key==='Enter') runSearch(); });
  inp.focus();

  window.setTab = function(tab){
    currentTab = tab;
    document.getElementById('tab-en').classList.toggle('on', tab==='en');
    document.getElementById('tab-ta').classList.toggle('on', tab==='ta');
    inp.placeholder = tab==='en' ? 'Search: love, grace, faith...' : 'தேடுக: அன்பு, கிருபை, விசுவாசம்...';
    if(inp.value.trim()) runSearch();
  };

  window.runSearch = async function(){
    const q = inp.value.trim();
    if(!q) return;

    body.innerHTML = '<div class="bload"><div class="bspin"></div><span>தேடுகிறது...</span></div>';

    try{
      if(currentTab === 'en'){
        await searchEnglish(q);
      } else {
        await searchTamil(q);
      }
    }catch(e){
      body.innerHTML = `<div class="srch-empty"><i class="ti ti-wifi-off"></i>தேடல் தோல்வி — இணையம் சரிபாருங்கள்<br><small>${e.message}</small></div>`;
    }
  };

  async function searchEnglish(q){
    // bible-api handles verse references, bolls.life handles word search
    // First try as verse reference (John 3:16)
    const refPat = /^[1-3\s]*[a-zA-Z]+\s+\d+:\d+/i;
    if(refPat.test(q)){
      const r = await fetch('https://bible-api.com/'+encodeURIComponent(q)+'?translation=kjv');
      const d = await r.json();
      if(!d.error && d.verses?.length){
        showResults(d.verses.map(v=>({
          ref: v.book_name+' '+v.chapter+':'+v.verse,
          text: v.text.trim().replace(/\n/g,' '),
          book: v.book_name.toLowerCase().replace(/\s/g,''), ch: v.chapter
        })), q);
        return;
      }
    }
    // Word search via bolls.life
    const url = `https://bolls.life/search/?search=${encodeURIComponent(q)}&translation=KJV&take=30&skip=0`;
    const r = await fetch(url);
    if(!r.ok) throw new Error('API error '+r.status);
    const d = await r.json();
    const vv = (d.results||d||[]).slice(0,30);
    if(!vv.length){
      body.innerHTML = `<div class="srch-empty"><i class="ti ti-search-off"></i>"${q}" — முடிவு இல்லை</div>`;
      return;
    }
    showResults(vv.map(v=>({
      ref: (v.book_name||v.book||'?')+' '+(v.chapter||'?')+':'+(v.verse||v.verse_nr||'?'),
      text: (v.text||v.verse_text||'').trim(),
      book: (v.book_name||v.book||'').toLowerCase().replace(/\s/g,''),
      ch: v.chapter||1
    })), q);
  }

  async function searchTamil(q){
    // Tamil search via bolls.life TAMOVR
    const url = `https://bolls.life/search/?search=${encodeURIComponent(q)}&translation=TAMOVR&take=30&skip=0`;
    const r = await fetch(url);
    if(!r.ok) throw new Error('API error '+r.status);
    const d = await r.json();
    const vv = (d.results||d||[]).slice(0,30);
    if(!vv.length){
      body.innerHTML = `<div class="srch-empty"><i class="ti ti-search-off"></i>"${q}" — முடிவு இல்லை</div>`;
      return;
    }
    // bolls returns book numbers — map to BOOKS
    showResults(vv.map(v=>{
      const bk = BOOKS.find(b=>b.n===(v.book||0));
      return {
        ref: (bk?bk.ta+' / '+bk.name:('Book '+v.book))+' '+(v.chapter||'?')+':'+(v.verse||v.verse_nr||'?'),
        text: (v.text||v.verse_text||'').trim(),
        book: bk?bk.id:'',
        ch: v.chapter||1
      };
    }), q);
  }

  function showResults(vv, q){
    const qEsc = q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    const hi = txt => txt.replace(new RegExp('('+qEsc+')','gi'),'<mark>$1</mark>');
    body.innerHTML = `<p class="sr-meta">"${q}" — ${vv.length} results</p>` +
      vv.map(v => {
        const st = v.text.replace(/'/g,"\\'").replace(/\\/g,'\\\\');
        const ref = v.ref.replace(/'/g,"\\'");
        return `<div class="sr-item">
          <div class="sr-ref">${v.ref}</div>
          <div class="sr-txt">${hi(v.text)}</div>
          <div class="sr-acts">
            <button class="sr-act" onclick="navigator.clipboard&&navigator.clipboard.writeText('${ref} — ${st}').then(()=>toast('📋 Copied!'))">Copy</button>
            ${v.book?`<button class="sr-act" onclick="goRead('${v.book}',${v.ch})">📖 Read</button>`:''}
          </div>
        </div>`;
      }).join('');
  }

  window.goRead = function(book, ch){
    try{ sessionStorage.setItem('enjc_go', JSON.stringify({book, ch})); }catch(e){}
    location.href = 'bible.html';
  };

})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/png" href="images/icons/icon-192.png">
<title>Word Search | ENJC</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/tools.css">
<link rel="stylesheet" href="css/design-system.css">
<link rel="stylesheet" href="css/premium-v2.css">
<link rel="stylesheet" href="css/mobile-fix.css">
<style>
body{background:var(--bg,#04101e);color:var(--tx,#e8eaf0);font-family:'DM Sans',system-ui,sans-serif;padding-bottom:40px}
.fp-head{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--bg2,#071628);border-bottom:1px solid var(--bd,#1a2d47);position:sticky;top:0;z-index:10}
.fp-back{width:36px;height:36px;border-radius:50%;background:none;border:1px solid var(--bd,#1a2d47);color:var(--tx,#e8eaf0);font-size:18px;display:flex;align-items:center;justify-content:center;text-decoration:none;flex-shrink:0}
.fp-title{font-size:17px;font-weight:600}
.fp-body{padding:16px}
</style>
<style>
.srch-bar{display:flex;gap:8px;padding:12px 16px;background:var(--bg2,#071628);border-bottom:1px solid var(--bd,#1a2d47)}
.srch-inp{flex:1;padding:10px 14px;border-radius:10px;background:var(--bg,#04101e);border:1px solid var(--bd,#1a2d47);color:var(--tx,#e8eaf0);font-size:15px;outline:none}
.srch-inp:focus{border-color:var(--gold,#c8a45a)}
.srch-go{padding:10px 18px;border-radius:10px;background:var(--gold,#c8a45a);border:none;color:#000;font-weight:700;cursor:pointer;flex-shrink:0}
.sr-meta{font-size:12px;color:var(--tx3,#5c7a9a);margin-bottom:12px}
.sr-item{padding:12px 14px;background:var(--bg2,#071628);border-radius:12px;margin-bottom:8px;border:1px solid var(--bd,#1a2d47)}
.sr-ref{font-size:11px;color:var(--gold,#c8a45a);margin-bottom:5px;font-weight:600}
.sr-txt{font-size:14px;line-height:1.6}
.sr-txt mark{background:rgba(200,164,90,.25);color:var(--gold,#c8a45a);border-radius:3px;padding:0 2px}
.sr-acts{display:flex;gap:6px;margin-top:8px;justify-content:flex-end}
.sr-act{padding:4px 10px;border-radius:6px;background:var(--bg,#04101e);border:1px solid var(--bd,#1a2d47);color:var(--tx2,#8a9bb0);font-size:12px;cursor:pointer}
.srch-empty{text-align:center;padding:48px 20px;color:var(--tx3,#5c7a9a)}
.srch-empty i{font-size:40px;display:block;margin-bottom:12px;opacity:.4}
</style>
</head>
<body>
<header class="fp-head">
  <a href="index.html" class="fp-back"><i class="ti ti-arrow-left"></i></a>
  <span class="fp-title">🔍 Word Search</span>
</header>
<div class="srch-bar">
  <input class="srch-inp" id="srch-inp" type="search" placeholder="தேடுக — faith, அன்பு, love..." autocomplete="off" spellcheck="false">
  <button class="srch-go" onclick="runSearch()">தேடு</button>
</div>
<div class="fp-body" id="fp-body">
  <div class="srch-empty"><i class="ti ti-bible"></i>வார்த்தை அல்லது வசன குறிப்பு தட்டச்சு செய்யுங்கள்</div>
</div>
<script src="js/features.js"></script>
<script>
(function(){
  document.documentElement.setAttribute('data-theme', localStorage.getItem('enjc-theme')||'dark');
  const inp = document.getElementById('srch-inp');
  const body = document.getElementById('fp-body');
  inp.addEventListener('keydown', e => { if(e.key==='Enter') runSearch(); });
  inp.focus();
  window.runSearch = async function(){
    const q = inp.value.trim(); if(!q) return;
    body.innerHTML = '<div class="bload"><div class="bspin"></div></div>';
    try{
      const r = await fetch('https://bible-api.com/'+encodeURIComponent(q)+'?translation=kjv');
      const d = await r.json();
      if(d.error) throw new Error(d.error);
      const vv = d.verses || [];
      if(!vv.length){ body.innerHTML='<div class="bempty">முடிவு இல்லை: "'+q+'"</div>'; return; }
      const qEsc = q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      body.innerHTML = '<p class="sr-meta">"'+q+'" — '+vv.length+' results</p>' +
        vv.map(v => {
          const ref = v.book_name+' '+v.chapter+':'+v.verse;
          const txt = v.text.replace(/\n/g,' ');
          const hi = txt.replace(new RegExp('('+qEsc+')','gi'),'<mark>$1</mark>');
          const sr = ref.replace(/'/g,"\\'"), st = txt.replace(/'/g,"\\'").replace(/\\/g,'\\\\');
          return '<div class="sr-item"><div class="sr-ref">'+ref+'</div><div class="sr-txt">'+hi+'</div>'+
            '<div class="sr-acts"><button class="sr-act" onclick="navigator.clipboard&&navigator.clipboard.writeText(\''+sr+' \u2014 '+st+'\')">📋 Copy</button>'+
            '<button class="sr-act" onclick="goRead(\''+v.book_name.toLowerCase().replace(/ /g,'')+'\','+v.chapter+')">📖 Read</button></div></div>';
        }).join('');
    }catch(e){ body.innerHTML='<div class="bempty">முடிவு இல்லை: "'+q+'"</div>'; }
  };
  window.goRead = function(book, ch){
    try{ sessionStorage.setItem('enjc_go', JSON.stringify({book, ch})); }catch(e){}
    location.href = 'bible.html';
  };
})();
</script>
</body></html>

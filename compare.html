<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/png" href="images/icons/icon-192.png">
<title>Compare Versions | ENJC</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/tools.css">
<link rel="stylesheet" href="css/design-system.css">
<link rel="stylesheet" href="css/premium-v2.css">
<link rel="stylesheet" href="css/mobile-fix.css">
<style>
body{background:var(--bg,#04101e);color:var(--tx,#e8eaf0);font-family:'DM Sans',system-ui,sans-serif;padding-bottom:40px}
.fp-head{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--bg2,#071628);border-bottom:1px solid var(--bd,#1a2d47);position:sticky;top:0;z-index:10}
.fp-back{width:36px;height:36px;border-radius:50%;background:none;border:1px solid var(--bd,#1a2d47);color:var(--tx,#e8eaf0);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none;flex-shrink:0}
.fp-title{font-size:17px;font-weight:600}
.fp-body{padding:16px}
.cmp-nav{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.cmp-nav select{flex:1;min-width:120px;padding:8px 10px;border-radius:10px;background:var(--bg2,#071628);border:1px solid var(--bd,#1a2d47);color:var(--tx,#e8eaf0);font-size:14px}
.cmp-nav button{padding:8px 16px;border-radius:10px;background:var(--gold,#c8a45a);border:none;color:#000;font-weight:600;font-size:14px;cursor:pointer}
</style>
</head>
<body>
<header class="fp-head">
  <a href="index.html" class="fp-back"><i class="ti ti-arrow-left"></i></a>
  <span class="fp-title">⇄ Compare Versions</span>
</header>
<div class="fp-body">
  <div class="cmp-nav">
    <select id="cmp-book-sel"></select>
    <select id="cmp-ch-sel"><option>1</option></select>
    <button onclick="loadCompare()">Compare</button>
  </div>
  <div id="fp-body"><div class="bempty">புத்தகம் தேர்ந்தெடுத்து Compare அழுத்துங்கள்.</div></div>
</div>
<script src="js/bible.js"></script>
<script>
(function(){
  const t = localStorage.getItem('enjc-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);

  function tryInit(){
    if(typeof BOOKS === 'undefined' || !BOOKS.length){ setTimeout(tryInit, 60); return; }
    // Populate book selector
    const bsel = document.getElementById('cmp-book-sel');
    BOOKS.forEach(b => {
      const o = document.createElement('option');
      o.value = b.id; o.textContent = (b.ta||b.name)+' · '+b.name;
      bsel.appendChild(o);
    });
    // Restore last used
    const last = JSON.parse(sessionStorage.getItem('enjc_go')||'{}');
    if(last.book){ bsel.value = last.book; }
    updateChSel();
    if(last.ch){ document.getElementById('cmp-ch-sel').value = last.ch; }
  }

  function updateChSel(){
    const bsel = document.getElementById('cmp-book-sel');
    const csel = document.getElementById('cmp-ch-sel');
    const book = BOOKS.find(b=>b.id===bsel.value);
    const chs = book ? book.chapters : 1;
    csel.innerHTML = '';
    for(let i=1;i<=chs;i++){
      const o=document.createElement('option'); o.value=i; o.textContent='Chapter '+i;
      csel.appendChild(o);
    }
  }

  document.getElementById('cmp-book-sel').addEventListener('change', updateChSel);

  window.loadCompare = function(){
    const bsel = document.getElementById('cmp-book-sel');
    const csel = document.getElementById('cmp-ch-sel');
    const book = BOOKS.find(b=>b.id===bsel.value);
    if(!book) return;
    S.book = book.id;
    S.bookName = book.name;
    S.bookTaName = book.ta||book.name;
    S.bookNum = book.num||BOOKS.indexOf(book)+1;
    S.ch = parseInt(csel.value)||1;
    renderCompare(document.getElementById('fp-body'));
  };

  function tryRender(){
    if(typeof BOOKS === 'undefined'){ setTimeout(tryRender, 60); return; }
    tryInit();
    // If bible.html passed a book via sessionStorage, auto-load
    const last = JSON.parse(sessionStorage.getItem('enjc_go')||'{}');
    if(last.book){ setTimeout(loadCompare, 200); }
  }
  tryRender();
})();
</script>
</body></html>

<!DOCTYPE html>
<html lang="en" data-theme="dark" data-page="compare">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/png" href="images/icons/icon-192.png">
<title>Compare Versions | ENJC</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/tools.css">
<link rel="stylesheet" href="css/design-system.css">
<link rel="stylesheet" href="css/premium-v2.css">
<link rel="stylesheet" href="css/mobile-fix.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;padding-bottom:60px}
</style>
<link rel="stylesheet" href="css/parchment.css">
</head>
<body>
<header class="fp-head">
  <a href="index.html" class="fp-back"><i class="ti ti-arrow-left"></i></a>
  <span class="fp-title">⇄ Compare Versions</span>
</header>

<div class="ctrl-wrap">
  <!-- Book & Chapter -->
  <div class="ctrl-row">
    <span class="ctrl-label">புத்தகம்</span>
    <select class="ctrl-sel" id="cmp-book-sel" onchange="updateChSel()"></select>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">அதிகாரம்</span>
    <select class="ctrl-sel" id="cmp-ch-sel"></select>
  </div>

  <!-- Selected versions pills -->
  <div>
    <div style="font-size:11px;color:var(--tx3);font-weight:600;letter-spacing:.04em;margin-bottom:6px">VERSIONS (max 5)</div>
    <div class="ver-pills" id="ver-pills"></div>
    <div class="ver-add-row" id="ver-add-row">
      <select class="ver-add-sel" id="ver-add-sel"></select>
      <button class="ver-add-btn" id="ver-add-btn" onclick="addVersion()">+ Add</button>
    </div>
  </div>

  <button class="cmp-go-btn" onclick="runMultiCompare()">Compare</button>
</div>

<div class="fp-body" id="fp-body">
  <div class="bempty">புத்தகம், அதிகாரம், versions தேர்ந்தெடுத்து Compare அழுத்துங்கள்.</div>
</div>

<script src="js/features.js"></script>
<script>
(function(){
  document.documentElement.setAttribute('data-theme', localStorage.getItem('enjc-theme')||'dark');

  const COLORS = ['vtag-1','vtag-2','vtag-3','vtag-4','vtag-5'];
  const PILL_COLORS = ['pill-1','pill-2','pill-3','pill-4','pill-5'];
  let selectedVersions = ['taov','kjv'];

  // Populate book selector
  const bsel = document.getElementById('cmp-book-sel');
  let lastType = '';
  BOOKS.forEach(b => {
    if(b.t !== lastType){
      const og = document.createElement('optgroup');
      og.label = b.t==='OT' ? 'பழைய ஏற்பாடு · Old Testament' : 'புதிய ஏற்பாடு · New Testament';
      bsel.appendChild(og); lastType = b.t;
    }
    const o = document.createElement('option');
    o.value = b.id; o.textContent = b.ta + ' · ' + b.name;
    bsel.lastElementChild.appendChild(o);
  });

  // Check sessionStorage for pre-selected book
  try{
    const go = JSON.parse(sessionStorage.getItem('enjc_go')||'null');
    if(go && go.book){ bsel.value = go.book; sessionStorage.removeItem('enjc_go'); }
  }catch(e){}

  window.updateChSel = function(){
    const csel = document.getElementById('cmp-ch-sel');
    const book = BOOKS.find(b=>b.id===bsel.value);
    csel.innerHTML = '';
    for(let i=1; i<=(book?book.ch:1); i++){
      const o = document.createElement('option');
      o.value = i; o.textContent = 'Chapter ' + i;
      csel.appendChild(o);
    }
  };
  updateChSel();

  function renderPills(){
    const pills = document.getElementById('ver-pills');
    pills.innerHTML = selectedVersions.map((vid,i) => {
      const v = getVer(vid);
      return `<div class="ver-pill ${PILL_COLORS[i]}">
        <span>${v ? v.short : vid}</span>
        <button class="pill-rm" onclick="removeVersion(${i})" title="Remove">✕</button>
      </div>`;
    }).join('');
    // Update add-sel to exclude already selected
    const addSel = document.getElementById('ver-add-sel');
    const prev = addSel.value;
    addSel.innerHTML = VERSIONS
      .filter(v => !selectedVersions.includes(v.id))
      .map(v => `<option value="${v.id}">${v.label}</option>`)
      .join('');
    document.getElementById('ver-add-btn').disabled = selectedVersions.length >= 5 || VERSIONS.filter(v=>!selectedVersions.includes(v.id)).length === 0;
    document.getElementById('ver-add-row').style.display = selectedVersions.length >= 5 ? 'none' : 'flex';
  }

  window.addVersion = function(){
    const sel = document.getElementById('ver-add-sel');
    if(!sel.value || selectedVersions.includes(sel.value)) return;
    selectedVersions.push(sel.value);
    renderPills();
  };

  window.removeVersion = function(i){
    if(selectedVersions.length <= 1){ toast('குறைந்தது ஒரு version வேண்டும்'); return; }
    selectedVersions.splice(i,1);
    renderPills();
  };

  window.runMultiCompare = async function(){
    const body = document.getElementById('fp-body');
    const book = BOOKS.find(b=>b.id===bsel.value);
    if(!book){ toast('புத்தகம் தேர்வு செய்யுங்கள்'); return; }
    const ch = parseInt(document.getElementById('cmp-ch-sel').value)||1;

    S.book = book.id; S.bookName = book.name; S.bookTaName = book.ta; S.bookNum = book.n; S.ch = ch;

    body.innerHTML = '<div class="bload"><div class="bspin"></div><span>Fetching versions...</span></div>';

    // Fetch all selected versions in parallel
    const results = await Promise.all(selectedVersions.map(vid => fetchVersionChapter(vid)));

    // Build verse number union
    const allNums = [...new Set(results.flatMap(vv => vv.map(v=>v.num)))].sort((a,b)=>a-b);
    if(!allNums.length){
      body.innerHTML = '<div class="bempty">வசனங்கள் கிடைக்கவில்லை — Internet சரிபாருங்கள்.</div>';
      return;
    }

    // Build lookup maps
    const maps = results.map(vv => {
      const m = {};
      vv.forEach(v => m[v.num]=v.text);
      return m;
    });

    const verLabels = selectedVersions.map(vid => getVer(vid));

    body.innerHTML = `
      <div class="cmp-book-head">${book.ta} · ${book.name} — Chapter ${ch}</div>
      <div class="ver-tags">${verLabels.map((v,i)=>`<span class="vtag ${COLORS[i]}">${v?v.short:selectedVersions[i]}</span>`).join('')}</div>
      ${allNums.map(n => `
        <div class="cmp-verse-block">
          <div class="cmp-vnum">Verse ${n}</div>
          ${selectedVersions.map((vid,i) => {
            const v = verLabels[i];
            const txt = maps[i][n] || '—';
            return `<div class="cmp-entry">
              <div class="cmp-entry-tag vtag ${COLORS[i]}">${v?v.short:vid}</div>
              <div class="cmp-entry-txt">${txt}</div>
            </div>`;
          }).join('')}
        </div>`).join('')}
      <button class="cmp-share" onclick="shareMulti()">🔗 Share</button>
    `;

    window._cmpResult = {book, ch, verLabels, maps, allNums, selectedVersions: [...selectedVersions]};
  };

  window.shareMulti = function(){
    const r = window._cmpResult;
    if(!r){ toast('Compare பண்ணுங்கள்'); return; }
    const head = `${r.book.ta} / ${r.book.name} ${r.ch} — ${r.verLabels.map(v=>v?v.short:'?').join(' vs ')}`;
    const lines = r.allNums.slice(0,6).map(n =>
      r.selectedVersions.map((vid,i)=>`[${r.verLabels[i]?r.verLabels[i].short:vid}] ${r.maps[i][n]||'—'}`).join('\n')
    );
    const msg = head + '\n\n' + lines.join('\n\n') + '\n\nhttps://elimnewjerusalem.github.io/enjc-bible/compare.html';
    if(navigator.share) navigator.share({title:head,text:msg}).catch(()=>{});
    else{ navigator.clipboard?.writeText(msg); toast('📋 Copied!'); }
  };

  renderPills();

})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/png" href="images/icons/icon-192.png">
<title>Compare Versions | ENJC</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/tools.css">
<link rel="stylesheet" href="css/design-system.css">
<link rel="stylesheet" href="css/premium-v2.css">
<link rel="stylesheet" href="css/mobile-fix.css">
<style>
body{background:var(--bg,#04101e);color:var(--tx,#e8eaf0);font-family:'DM Sans',system-ui,sans-serif;padding-bottom:40px}
.fp-head{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--bg2,#071628);border-bottom:1px solid var(--bd,#1a2d47);position:sticky;top:0;z-index:10}
.fp-back{width:36px;height:36px;border-radius:50%;background:none;border:1px solid var(--bd,#1a2d47);color:var(--tx,#e8eaf0);font-size:18px;display:flex;align-items:center;justify-content:center;text-decoration:none;flex-shrink:0}
.fp-title{font-size:17px;font-weight:600}
.fp-body{padding:16px}
</style>
<style>
.cmp-nav{display:flex;gap:8px;padding:12px 16px;background:var(--bg2,#071628);border-bottom:1px solid var(--bd,#1a2d47);flex-wrap:wrap}
.cmp-sel{flex:1;min-width:120px;padding:9px 10px;border-radius:10px;background:var(--bg,#04101e);border:1px solid var(--bd,#1a2d47);color:var(--tx,#e8eaf0);font-size:13px}
.cmp-go{padding:9px 18px;border-radius:10px;background:var(--gold,#c8a45a);border:none;color:#000;font-weight:700;font-size:14px;cursor:pointer;flex-shrink:0}
</style>
</head>
<body>
<header class="fp-head">
  <a href="index.html" class="fp-back"><i class="ti ti-arrow-left"></i></a>
  <span class="fp-title">⇄ Compare Versions</span>
</header>
<div class="cmp-nav">
  <select class="cmp-sel" id="cmp-book-sel"></select>
  <select class="cmp-sel" id="cmp-ch-sel"><option>1</option></select>
  <button class="cmp-go" onclick="loadCompare()">Compare</button>
</div>
<div class="fp-body" id="fp-body"><div class="bempty">புத்தகம் தேர்ந்தெடுத்து Compare அழுத்துங்கள்.</div></div>
<script src="js/features.js"></script>
<script>
(function(){
  document.documentElement.setAttribute('data-theme', localStorage.getItem('enjc-theme')||'dark');
  const bsel = document.getElementById('cmp-book-sel');
  const csel = document.getElementById('cmp-ch-sel');
  BOOKS.forEach(b => {
    const o = document.createElement('option');
    o.value = b.id; o.textContent = (b.ta||b.name)+' · '+b.name;
    bsel.appendChild(o);
  });
  function updateChSel(){
    const book = BOOKS.find(b=>b.id===bsel.value);
    const chs = book ? book.ch : 1;
    csel.innerHTML = '';
    for(let i=1;i<=chs;i++){ const o=document.createElement('option'); o.value=i; o.textContent='Chapter '+i; csel.appendChild(o); }
  }
  bsel.addEventListener('change', updateChSel);
  updateChSel();
  window.loadCompare = function(){
    const book = BOOKS.find(b=>b.id===bsel.value); if(!book) return;
    S.book=book.id; S.bookName=book.name; S.bookTaName=book.ta||book.name; S.bookNum=book.n; S.ch=parseInt(csel.value)||1;
    renderCompare(document.getElementById('fp-body'));
  };
})();
</script>
</body></html>
